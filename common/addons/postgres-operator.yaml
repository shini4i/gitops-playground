apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-postgres-operator
spec:
  goTemplate: true
  goTemplateOptions: [ "missingkey=error" ]
  applyNestedSelectors: true
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - clusters:
        values:
          addonChart: postgres-operator
          addonChartNamespace: postgres-operator
          addonChartVersion: 1.15.1
          addonChartRepository: https://opensource.zalando.com/postgres-operator/charts/postgres-operator
        selector:
          matchExpressions:
            - key: argocd.argoproj.io/secret-type
              operator: In
              values: [cluster]
            - key: enable_postgres_operator
              operator: In
              values: ['true']
  template:
    metadata:
      name: addon-{{.values.addonChart}}
      labels:
        managed-by: ApplicationSet
    spec:
      project: default
      sources:
        - chart: '{{.values.addonChart}}'
          repoURL: '{{.values.addonChartRepository}}'
          targetRevision: '{{.values.addonChartVersion}}'
          helm:
            releaseName: '{{.values.addonChart}}'
            valuesObject:
              configKubernetes:
                enable_pod_antiaffinity: false
      destination:
        namespace: '{{.values.addonChartNamespace}}'
        name: '{{.name}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - '.spec.preserveUnknownFields'
